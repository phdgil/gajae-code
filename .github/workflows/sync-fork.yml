name: Sync fork main

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-fork-main
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure upstream
        run: |
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/Yeachan-Heo/gajae-code.git
          else
            git remote add upstream https://github.com/Yeachan-Heo/gajae-code.git
          fi

      - name: Fetch upstream main
        run: git fetch upstream main

      - name: Fast-forward fork main
        run: |
          git checkout main
          git merge --ff-only upstream/main

      - name: Push fork main
        run: git push origin main
