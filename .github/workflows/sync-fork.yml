name: Sync fork main

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-fork-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure upstream
        run: |
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/Yeachan-Heo/gajae-code.git
          else
            git remote add upstream https://github.com/Yeachan-Heo/gajae-code.git
          fi

      - name: Fetch upstream main
        run: git fetch upstream main

      - name: Check fast-forward eligibility
        id: fast_forward
        run: |
          git checkout main
          if git merge-base --is-ancestor HEAD upstream/main; then
            echo "can_sync=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_sync=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Fork main diverged::Skipping automatic sync because fork main has commits that are not in upstream/main. Rebase or merge manually when you want to reconcile upstream changes."
          fi

      - name: Fast-forward fork main
        if: steps.fast_forward.outputs.can_sync == 'true'
        run: |
          git merge --ff-only upstream/main

      - name: Push fork main
        if: steps.fast_forward.outputs.can_sync == 'true'
        run: git push origin main
