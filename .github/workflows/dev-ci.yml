name: Dev CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  affected:
    name: Affected path validation
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, Linux, X64, gajae-code-heavy]
    timeout-minutes: 30
    env:
      GITHUB_EVENT_BEFORE: ${{ github.event.before }}
      GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3"
      - name: Compute affected flags
        id: flags
        run: |
          bun scripts/ci-job-relevance.ts
          bun scripts/ci-dev-affected.ts --emit-flags
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2  # nightly
        if: steps.flags.outputs.relevant == 'true' && (steps.flags.outputs.rust == 'true' || steps.flags.outputs.native == 'true')
        with:
          toolchain: nightly-2026-04-29
      - uses: taiki-e/install-action@56545b37b57562edd73171cb6c62cc509db4c34e  # v2
        if: steps.flags.outputs.relevant == 'true' && steps.flags.outputs.rust == 'true'
        with:
          tool: nextest
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        if: steps.flags.outputs.relevant == 'true' && (steps.flags.outputs.rust == 'true' || steps.flags.outputs.native == 'true')
        with:
          shared-key: dev-affected-linux-x64
          cache-on-failure: true
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/dev' }}
          cache-workspace-crates: true
      - name: Cache bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
      - name: Install system deps
        if: steps.flags.outputs.relevant == 'true'
        run: bash scripts/ci-install-system-deps.sh
      - if: steps.flags.outputs.relevant == 'true'
        run: bun install --frozen-lockfile
      - name: Run affected path checks and tests
        if: steps.flags.outputs.relevant == 'true'
        run: bun scripts/ci-dev-affected.ts

  gjc-state-gates-matrix:
    name: gjc-state-gates / ${{ matrix.group }}
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, Linux, X64, gajae-layofflabs-3990x-2]
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        group: [static, runtime, integrity, read]
    env:
      GITHUB_EVENT_BEFORE: ${{ github.event.before }}
      GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3"
      - name: Restore bun dependency cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Run GJC state gate shard
        run: bun scripts/ci-gjc-state-gates.ts --group=${{ matrix.group }}

  # Branch protection must keep requiring this stable aggregate status.
  gjc-state-gates:
    name: gjc-state-gates
    if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    needs: [gjc-state-gates-matrix]
    runs-on: [self-hosted, Linux, X64, gajae-layofflabs-3990x-2]
    timeout-minutes: 5
    steps:
      - name: Aggregate GJC state gate shards
        run: |
          result='${{ needs.gjc-state-gates-matrix.result }}'
          echo "gjc-state-gates shard result: $result"
          test "$result" = success
